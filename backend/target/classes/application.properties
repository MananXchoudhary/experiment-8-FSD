spring.application.name=spring-security-jwt

spring.datasource.url=jdbc:h2:mem:experiment8db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

jwt.secret=ThisIsAVeryLongSecretKeyForJWTTokenGenerationInexperiment8SpringSecurityDemo2024
jwt.expiration=86400000

server.port=8080
